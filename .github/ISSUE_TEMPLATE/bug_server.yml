name: "Bug: Server / Plugin"
description: A server-side plugin issue (ratings, studio logos, notifications, Seerr, games, endpoints, config page)
title: "[Plugin] "
labels: ["Bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please include the plugin and server versions, these issues are usually environment dependent.

  - type: input
    id: plugin_version
    attributes:
      label: Plugin version
      description: The Moonbase plugin version (from the Jellyfin plugins page)
      placeholder: 1.0.0
    validations:
      required: true

  - type: input
    id: server_version
    attributes:
      label: Server type and version
      description: "e.g. Jellyfin 10.10.0"
      placeholder: Jellyfin 10.x.x
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the plugin is affected?
      options:
        - Ratings (MDBList / TMDB)
        - Notifications / Push (FCM / relay)
        - Seerr integration
        - Games / Emulators
        - Custom home rows
        - Web Client (Go to Moonfin-Core)
        - Config page
        - API / endpoint
        - Other / not sure
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened
      description: Describe the problem and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: Frequency
      options:
        - Always
        - Sometimes
        - Once
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Server logs / errors (optional)
      description: Paste any relevant Jellyfin server log lines or on-screen errors.
    validations:
      required: false

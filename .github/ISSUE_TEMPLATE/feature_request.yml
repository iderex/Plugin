name: Feature request
description: Suggest an improvement or new feature for the plugin
title: "[Feature] "
labels: ["Feature Request"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point or missing capability.
      placeholder: I find it frustrating when...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should the plugin handle this?
      placeholder: It would be great if...
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the plugin does this apply to?
      multiple: true
      options:
        - Settings sync / profiles
        - Admin defaults / config page
        - Ratings (MDBList / TMDB)
        - Notifications / Push (FCM / relay)
        - Seerr integration
        - Games / Emulators
        - Custom home rows
        - Web Client (Go to Moonfin-Core)
        - Other / not sure
    validations:
      required: true

  - type: textarea
    id: client_impact
    attributes:
      label: Client impact
      description: Would this need matching work in a client (Core, Smart-TV, Roku)? Link anything relevant.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought of.
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, mockups, links, related issues, etc.
    validations:
      required: false
